version: 2

models:
  - name: dim_customers
    description: "A dimension table containing customer information."
    columns:
      - name: customer_id
        description: "The unique identifier for a customer."
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "A dimension table containing product information."
    columns:
      - name: product_id
        description: "The unique identifier for a product."
        tests:
          - unique
          - not_null

  - name: fct_sales
    description: "A fact table containing sales transaction data, with one row per product in an order."
    columns:
      - name: order_id
        description: "The unique identifier for an order."
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key to the dim_customers table."
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        description: "Foreign key to the dim_products table."
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id